name: souq_marketplace
description: Souq – Application marketplace mobile simple et moderne
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0

  # Image handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0

  # External links (WhatsApp, phone, Facebook)
  url_launcher: ^6.2.1

  # File/Storage (for payment proof)
  path_provider: ^2.1.1

  # (connectivity_plus, flutter_secure_storage, supabase_flutter removed — mock mode only)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/data/
    - lib/assets/images/
